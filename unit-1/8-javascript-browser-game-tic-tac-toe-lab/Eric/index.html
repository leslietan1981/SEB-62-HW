<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sekuya&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <div class="board-wrapper">
        <h1>Tic Tac Toe</h1>
        <div class="board">
          <div class="square top-left" id="0"></div>
          <div class="square top" id="1"></div>
          <div class="square top-right" id="2"></div>
          <div class="square left" id="3"></div>
          <div class="square center" id="4"></div>
          <div class="square right" id="5"></div>
          <div class="square bottom-left" id="6"></div>
          <div class="square bottom" id="7"></div>
          <div class="square bottom-right" id="8"></div>
        </div>
        <div class="dashboard">
          <h2>Status:</h2>
          <div class="message-component">
            <p id="message">ABCD</p>
          </div>
          <button id="reset" class="reset-game">Reset Game</button>
        </div>
      </div>
    </main>

    <!-- Background effect -->
    <div class="dust-container">
      <div class="particle" style="left: 10%; animation-delay: 0s"></div>
      <div
        class="particle"
        style="left: 25%; animation-delay: 2s; width: 1px"
      ></div>
      <div class="particle" style="left: 40%; animation-delay: 5s"></div>
      <div
        class="particle"
        style="left: 60%; animation-delay: 1s; width: 3px"
      ></div>
      <div class="particle" style="left: 85%; animation-delay: 4s"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
